
services:
  # Relational Store: Source of Truth for raw transaction data
  postgres:
    image: postgres:15-alpine
    container_name: tav_postgres
    restart: on-failure:3
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Graph Store: For relationship traversal and anomaly detection
  neo4j:
    image: neo4j:5.12
    container_name: tav_neo4j
    restart: always
    ports:
      - "7474:7474" # Browser UI
      - "7687:7687" # Bolt Protocol
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]' # APOC adds procedures for complex graph logic
    volumes:
      - neo4j_data:/data

  # Message Broker: Backend for BullMQ (Async Processing)
  redis:
    image: redis:7-alpine
    container_name: tav_redis
    ports:
      - "6379:6379"

  # Backend service – Node/Express API
  backend:
    build: ./backend
    depends_on: [neo4j, postgres, redis]
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      PG_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"

  # Dashboard – Vite dev server (or static build)
  dashboard:
    build: ./dashboard
    depends_on: [backend]
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"

volumes:
  pgdata:
  neo4j_data: